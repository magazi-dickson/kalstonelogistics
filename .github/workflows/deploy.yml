name: 🚀 Deploy to kalstonelogistics.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy → cPanel
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "=== Starting deployment ==="

            cd ~/kalstonelogistics

            echo "--- Pulling latest code from GitHub ---"
            git pull origin main

            echo "--- Fixing permissions ---"
            chmod 755 ~/kalstonelogistics/
            chmod 664 ~/kalstonelogistics/cargo.db 2>/dev/null || true

            echo "--- Restarting Python app ---"
            mkdir -p ~/kalstonelogistics/tmp
            touch ~/kalstonelogistics/tmp/restart.txt

            echo "=== Deployment complete! ==="

      - name: 🌐 Verify Live Site
        run: |
          echo "Waiting 20 seconds for app to restart..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kalstonelogistics.com)
          echo "Live site HTTP status: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ kalstonelogistics.com is live and responding!"
          else
            echo "⚠️ Site returned HTTP $STATUS — may still be restarting"
          fi
