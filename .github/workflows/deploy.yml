name: 🚀 Deploy to kalstonelogistics.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via Webhook
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Trigger cPanel Webhook Deploy
        run: |
          echo "Sending deploy webhook to kalstonelogistics.com..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '${{ github.event.head_commit.id }}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | awk '{print $2}')" \
            "https://kalstonelogistics.com/webhook/deploy" \
            -d '{"ref":"refs/heads/main","pusher":{"name":"github-actions"}}' \
            --max-time 120 2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

      - name: 🌐 Verify Live Site
        run: |
          echo "Waiting 25 seconds for app to restart..."
          sleep 25
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kalstonelogistics.com --max-time 30)
          echo "Live site HTTP status: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ kalstonelogistics.com is live!"
          else
            echo "⚠️ Site returned HTTP $STATUS"
          fi
