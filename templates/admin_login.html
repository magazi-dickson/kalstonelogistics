<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Kalstone Logistics</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%231e3a8a'/><text y='.9em' font-size='70' x='10' fill='%23facc15'>K</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="login-body">
    <div class="login-bg">
        <div class="login-orb orb-1"></div>
        <div class="login-orb orb-2"></div>
    </div>

    <div class="login-card animate-fade-up">
        <div class="login-brand">
            <div class="login-logo"><i class="fas fa-boxes-stacked"></i></div>
            <h1 class="login-title">Kalstone<br><span>Cargo Admin</span></h1>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="admin-alert alert-{{ category }} mb-login">
                <i class="fas fa-{% if category == 'success' %}check-circle{% elif category == 'danger' %}times-circle{% else %}info-circle{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" class="login-form">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                <div class="password-field">
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required id="loginPwd">
                    <button type="button" class="pwd-toggle" onclick="togglePwd()">
                        <i class="fas fa-eye" id="pwdIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block login-btn">
                <i class="fas fa-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div class="login-footer">
            <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </div>
    </div>

    <script>
    function togglePwd() {
        const input = document.getElementById('loginPwd');
        const icon = document.getElementById('pwdIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fas fa-eye';
        }
    }
    </script>
</body>
</html>
